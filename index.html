<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电子投票系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }
        body { background: #f5f7fa; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .title { text-align: center; font-size: 28px; font-weight: bold; color: #2c3e50; margin: 20px 0; }
        .tab-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .tab { padding: 8px 20px; background: #fff; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .tab.active { background: #409eff; color: #fff; border-color: #409eff; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h3 { color: #333; margin-bottom: 15px; font-size: 18px; }
        .vote-item { display: flex; align-items: center; padding: 10px; border: 1px solid #eee; border-radius: 6px; margin-bottom: 8px; gap: 10px; }
        .vote-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; border: 1px solid #eee; }
        .vote-item label { flex: 1; font-size: 14px; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; color: #fff; cursor: pointer; font-size: 14px; }
        .btn-primary { background: #409eff; }
        .btn-success { background: #67c23a; }
        .btn-danger { background: #f56c6c; }
        .chart-box { height: 350px; margin-top: 15px; }
        .login-box { max-width: 350px; margin: 0 auto; }
        .login-box input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 10px; font-size: 14px; }
        .add-form { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .add-form input { flex: 1; min-width: 180px; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .option-item { display: flex; align-items: center; gap: 8px; padding: 8px; border: 1px solid #eee; border-radius: 6px; margin-bottom: 6px; }
        .option-item img { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; }
        .option-item span { flex: 1; font-size: 13px; }
        .tip { font-size: 12px; color: #999; margin-top: 8px; }
        .storage-tip { color: #e6a23c; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
<div class="container">
    <div class="title">电子投票系统</div>

    <div class="tab-bar">
        <div class="tab active" onclick="switchPage('vote')">我要投票</div>
        <div class="tab" onclick="switchPage('result')">投票结果</div>
        <div class="tab" onclick="switchPage('admin')">管理员后台</div>
    </div>

    <!-- 投票页面 -->
    <div id="vote" class="page active">
        <div class="card">
            <h3>投票选项（仅投1票）</h3>
            <div id="voteContainer"></div>
            <button class="btn btn-primary" onclick="submitVote()" style="margin-top: 15px;">提交投票</button>
            <div class="tip" id="voteTip"></div>
        </div>
    </div>

    <!-- 结果页面 -->
    <div id="result" class="page">
        <div class="card">
            <h3>投票结果统计</h3>
            <div class="chart-box">
                <canvas id="resultChart"></canvas>
            </div>
        </div>
    </div>

    <!-- 管理员页面 -->
    <div id="admin" class="page">
        <div class="card login-box" id="loginCard">
            <h3>管理员登录</h3>
            <input type="password" id="adminPwd" placeholder="管理员密码：123456">
            <button class="btn btn-primary w-100" onclick="adminLogin()">登录</button>
        </div>

        <div class="card" id="adminPanel" style="display: none;">
            <h3>投票选项管理</h3>
            <div class="add-form">
                <input type="text" id="optName" placeholder="请输入选项名称">
                <input type="file" id="optImg" accept="image/png,image/jpg,image/jpeg">
                <button class="btn btn-success" onclick="addOption()">添加选项</button>
            </div>
            <div class="storage-tip">提示：图片将自动压缩，单张不超过200KB，最多添加10个选项</div>
            <div id="optContainer"></div>
            <button class="btn btn-danger" onclick="resetSystem()" style="margin-top: 15px;">清空系统（重置所有）</button>
        </div>
    </div>
</div>

<script>
// 核心配置
const CONFIG = {
    PASSWORD: "123456",
    STORAGE_KEY: "VOTE_SYSTEM",
    MAX_OPTIONS: 10, // 最大选项数
    MAX_IMG_SIZE: 200 * 1024, // 图片最大200KB
    IMG_WIDTH: 100, // 压缩后图片宽度
    IMG_HEIGHT: 100 // 压缩后图片高度
};

// 页面切换核心
function switchPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    event.target.classList.add('active');
    
    // 页面切换后刷新对应内容
    if (pageId === 'vote') renderVotePage();
    if (pageId === 'result') renderChart();
}

// ================= 数据核心（重构：分模块存储，避免单键超限） =================
function initSystem() {
    // 初始化3个独立存储键，避免单键体积过大
    if (!localStorage.getItem(`${CONFIG.STORAGE_KEY}_options`)) {
        localStorage.setItem(`${CONFIG.STORAGE_KEY}_options`, JSON.stringify([]));
    }
    if (!localStorage.getItem(`${CONFIG.STORAGE_KEY}_voted`)) {
        localStorage.setItem(`${CONFIG.STORAGE_KEY}_voted`, JSON.stringify(false));
    }
}

// 获取选项数据
function getOptions() {
    return JSON.parse(localStorage.getItem(`${CONFIG.STORAGE_KEY}_options`) || '[]');
}

// 保存选项数据
function saveOptions(options) {
    localStorage.setItem(`${CONFIG.STORAGE_KEY}_options`, JSON.stringify(options));
}

// 获取投票状态
function hasVoted() {
    return JSON.parse(localStorage.getItem(`${CONFIG.STORAGE_KEY}_voted`) || 'false');
}

// 设置投票状态
function setVoted(status) {
    localStorage.setItem(`${CONFIG.STORAGE_KEY}_voted`, JSON.stringify(status));
}

// ================= 图片压缩核心（解决存储超限） =================
function compressImage(file, callback) {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = function(e) {
        const img = new Image();
        img.src = e.target.result;
        img.onload = function() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // 等比缩放
            let w = CONFIG.IMG_WIDTH;
            let h = CONFIG.IMG_HEIGHT;
            if (img.width > img.height) {
                h = img.height * (w / img.width);
            } else {
                w = img.width * (h / img.height);
            }
            canvas.width = w;
            canvas.height = h;
            
            // 绘制并压缩
            ctx.drawImage(img, 0, 0, w, h);
            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6); // 质量0.6，平衡体积和清晰度
            
            // 转换为Blob计算体积
            const blob = dataURLtoBlob(compressedBase64);
            if (blob.size > CONFIG.MAX_IMG_SIZE) {
                callback(null, '图片压缩后仍超过200KB，请换更小的图片');
                return;
            }
            callback(compressedBase64, null);
        }
    }
}

// Base64转Blob（用于计算体积）
function dataURLtoBlob(dataURL) {
    const arr = dataURL.split(',');
    const mime = arr[0].match(/:(.*?);/)[1];
    const bstr = atob(arr[1]);
    let n = bstr.length;
    const u8arr = new Uint8Array(n);
    while (n--) {
        u8arr[n] = bstr.charCodeAt(n);
    }
    return new Blob([u8arr], { type: mime });
}

// ================= 投票页面 =================
function renderVotePage() {
    const options = getOptions();
    const container = document.getElementById('voteContainer');
    container.innerHTML = '';

    if (options.length === 0) {
        container.innerHTML = '<div style="padding: 20px; color: #999; text-align: center;">暂无投票选项</div>';
        document.querySelector('.btn-primary').disabled = true;
        return;
    }

    // 渲染选项
    options.forEach(opt => {
        const item = document.createElement('div');
        item.className = 'vote-item';
        item.innerHTML = `
            <input type="radio" name="vote" value="${opt.id}" id="opt_${opt.id}">
            <img src="${opt.img}" alt="${opt.name}">
            <label for="opt_${opt.id}">${opt.name}</label>
        `;
        container.appendChild(item);
    });

    // 投票状态提示
    const voted = hasVoted();
    document.getElementById('voteTip').innerText = voted ? '您已完成投票，重置后可再次投票' : '';
    document.querySelector('.btn-primary').disabled = voted;
}

function submitVote() {
    const selected = document.querySelector('input[name="vote"]:checked');
    if (!selected) {
        alert('请选择一个投票选项！');
        return;
    }

    const options = getOptions();
    const optId = parseInt(selected.value);
    const targetOpt = options.find(opt => opt.id === optId);
    if (targetOpt) {
        targetOpt.count += 1;
        saveOptions(options);
        setVoted(true);
        alert('投票成功！');
        renderVotePage();
        renderChart();
    }
}

// ================= 结果图表 =================
let chartInstance = null;
function renderChart() {
    const options = getOptions();
    const ctx = document.getElementById('resultChart').getContext('2d');

    // 销毁旧图表
    if (chartInstance) chartInstance.destroy();

    // 准备数据
    const labels = options.map(opt => opt.name);
    const data = options.map(opt => opt.count);
    const total = data.reduce((a, b) => a + b, 0);

    // 渲染图表
    chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: `总票数：${total}`,
                data: data,
                backgroundColor: '#409eff',
                borderRadius: 4,
                barThickness: 30
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: true, position: 'top' },
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            const value = context.raw;
                            const percent = total > 0 ? (value / total * 100).toFixed(1) + '%' : '0%';
                            return `票数：${value} (${percent})`;
                        }
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: { precision: 0 }
                }
            }
        }
    });
}

// ================= 管理员后台 =================
function adminLogin() {
    const pwd = document.getElementById('adminPwd').value.trim();
    if (pwd === CONFIG.PASSWORD) {
        document.getElementById('loginCard').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        renderAdminOptions();
    } else {
        alert('密码错误！默认密码：123456');
    }
}

function renderAdminOptions() {
    const options = getOptions();
    const container = document.getElementById('optContainer');
    container.innerHTML = '';

    if (options.length === 0) {
        container.innerHTML = '<div style="padding: 15px; color: #999;">暂无选项，点击添加</div>';
        return;
    }

    // 渲染管理选项
    options.forEach(opt => {
        const item = document.createElement('div');
        item.className = 'option-item';
        item.innerHTML = `
            <img src="${opt.img}" alt="${opt.name}">
            <span>${opt.name}（当前票数：${opt.count}）</span>
            <button class="btn btn-danger btn-sm" onclick="deleteOption(${opt.id})">删除</button>
        `;
        container.appendChild(item);
    });
}

function addOption() {
    const name = document.getElementById('optName').value.trim();
    const file = document.getElementById('optImg').files[0];
    const options = getOptions();

    // 前置校验
    if (!name) {
        alert('请输入选项名称！');
        return;
    }
    if (!file) {
        alert('请选择图片！');
        return;
    }
    if (options.length >= CONFIG.MAX_OPTIONS) {
        alert(`最多只能添加${CONFIG.MAX_OPTIONS}个选项！`);
        return;
    }

    // 压缩图片并添加
    compressImage(file, (compressedImg, err) => {
        if (err) {
            alert(err);
            return;
        }

        // 生成新ID
        const newId = options.length > 0 ? Math.max(...options.map(o => o.id)) + 1 : 1;
        // 新增选项
        options.push({
            id: newId,
            name: name,
            img: compressedImg,
            count: 0
        });

        // 保存并刷新
        saveOptions(options);
        document.getElementById('optName').value = '';
        document.getElementById('optImg').value = '';
        renderAdminOptions();
        renderVotePage();
        alert('选项添加成功！');
    });
}

function deleteOption(optId) {
    if (confirm('确定删除该选项吗？删除后不可恢复！')) {
        let options = getOptions();
        options = options.filter(opt => opt.id !== optId);
        saveOptions(options);
        renderAdminOptions();
        renderVotePage();
    }
}

function resetSystem() {
    if (confirm('警告：将清空所有选项、图片、投票记录，是否确定？')) {
        // 清空所有存储
        localStorage.removeItem(`${CONFIG.STORAGE_KEY}_options`);
        localStorage.removeItem(`${CONFIG.STORAGE_KEY}_voted`);
        // 重新初始化
        initSystem();
        // 刷新页面
        renderAdminOptions();
        renderVotePage();
        renderChart();
        alert('系统已重置！请重新添加选项');
    }
}

// 系统启动
initSystem();
renderVotePage();
</script>
</body>
</html>
