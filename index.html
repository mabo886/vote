<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投票系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei,sans-serif}
        body{background:#f5f7fa;padding:20px}
        .container{max-width:900px;margin:0 auto}
        .title{text-align:center;font-size:28px;font-weight:700;color:#2c3e50;margin:20px 0}
        .tab-bar{display:flex;justify-content:center;gap:8px;margin-bottom:20px}
        .tab{padding:8px 20px;background:#fff;border:1px solid #ddd;border-radius:6px;cursor:pointer;font-size:14px}
        .tab.active{background:#409eff;color:#fff;border-color:#409eff}
        .page{display:none}
        .page.active{display:block}
        .card{background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.05);margin-bottom:20px}
        h3{color:#333;margin-bottom:15px;font-size:18px}
        .vote-item{display:flex;align-items:center;padding:10px;border:1px solid #eee;border-radius:6px;margin-bottom:8px;gap:10px}
        .vote-item img{width:80px;height:80px;object-fit:cover;border-radius:4px}
        .vote-item label{flex:1;font-size:14px}
        .btn{padding:8px 16px;border:none;border-radius:6px;color:#fff;cursor:pointer;font-size:14px}
        .btn-primary{background:#409eff}
        .btn-success{background:#67c23a}
        .btn-danger{background:#f56c6c}
        .chart-box{height:350px;margin-top:15px}
        .login-box{max-width:350px;margin:0 auto}
        .login-box input{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;margin-bottom:10px}
        .add-form{display:flex;gap:8px;margin-bottom:15px;flex-wrap:wrap}
        .add-form input{flex:1;min-width:180px;padding:8px;border:1px solid #ddd;border-radius:6px}
        .option-item{display:flex;align-items:center;gap:8px;padding:8px;border:1px solid #eee;border-radius:6px;margin-bottom:6px}
        .option-item img{width:60px;height:60px;object-fit:cover;border-radius:4px}
        .option-item span{flex:1;font-size:13px}
        .tip{font-size:12px;color:#999;margin-top:8px}
    </style>
</head>
<body>

<div class="container">
    <div class="title">电子投票系统</div>

    <div class="tab-bar">
        <div class="tab active" onclick="show('vote')">我要投票</div>
        <div class="tab" onclick="show('result')">投票结果</div>
        <div class="tab" onclick="show('admin')">管理后台</div>
    </div>

    <div id="vote" class="page active">
        <div class="card">
            <h3>请选择你的选项</h3>
            <div id="list" style="margin-top:15px"></div>
            <button class="btn btn-primary" onclick="vote()" style="margin-top:15px">确认投票</button>
            <div id="msg" style="margin-top:10px;color:#666"></div>
        </div>
    </div>

    <div id="result" class="page">
        <div class="card">
            <h3>实时投票统计</h3>
            <div class="chart-box"><canvas id="chart"></canvas></div>
        </div>
    </div>

    <div id="admin" class="page">
        <div class="card login-box" id="login">
            <h3>管理员登录</h3>
            <input type="password" id="pwd" placeholder="请输入密码">
            <button class="btn btn-primary" onclick="login()">登录</button>
        </div>

        <div class="card" id="panel" style="display:none">
            <h3>选项管理</h3>
            <div class="add-form">
                <input id="name" placeholder="选项名称">
                <input type="file" id="img" accept="image/*">
                <button class="btn btn-success" onclick="add()">添加选项</button>
            </div>
            <div id="adminList" style="margin-top:15px"></div>
            <button class="btn btn-danger" onclick="reset()" style="margin-top:15px">清空票数</button>
            <div class="tip">所有设备实时同步</div>
        </div>
    </div>
</div>

<script>
// 云端数据库
const API = "https://api.jsonbin.io/v3/b/668e1c1cad19ca66177a3333";
const API_KEY = "$2a$10$QJzH4c4Vp56GJ1H1G1G1G1G1G1G1G1";

// 管理员密码
const ADMIN_PWD = "123456";

let data = { options: [], voted: [] };

// 切换页面
function show(id) {
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    event.target.classList.add("active");
    if(id==="vote") loadVote();
    if(id==="result") loadData().then(drawChart);
}

// 读取云端
async function loadData() {
    const res = await fetch(API, {headers:{"X-Master-Key":API_KEY}});
    const json = await res.json();
    data = json.record || {options:[], voted:[]};
    return data;
}

// 保存云端
async function saveData() {
    await fetch(API, {
        method:"PUT",
        headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},
        body:JSON.stringify(data)
    });
}

// 渲染投票
async function loadVote() {
    await loadData();
    const list = document.getElementById("list");
    list.innerHTML = "";
    if(data.options.length===0){
        list.innerHTML = `<div style="padding:15px;color:#999">暂无选项</div>`;
        return;
    }
    data.options.forEach((o,i)=>{
        const div = document.createElement("div");
        div.className = "vote-item";
        div.innerHTML = `
            <input type="radio" name="opt" value="${i}">
            <img src="${o.img}">
            <label>${o.name}</label>
        `;
        list.appendChild(div);
    });
}

// 投票
async function vote() {
    await loadData();
    const sel = document.querySelector('input[name="opt"]:checked');
    if(!sel) return alert("请选择一个选项");
    const uid = "user_" + navigator.userAgent + screen.width;
    if(data.voted.includes(uid)) return alert("你已投过票");

    data.options[sel.value].count++;
    data.voted.push(uid);
    await saveData();
    document.getElementById("msg").innerText = "投票成功！";
}

// 图表
let chart;
async function drawChart() {
    await loadData();
    const ctx = document.getElementById("chart").getContext("2d");
    if(chart) chart.destroy();
    chart = new Chart(ctx,{
        type:"bar",
        data:{
            labels: data.options.map(o=>o.name),
            datasets:[{label:"票数", data:data.options.map(o=>o.count), backgroundColor:"#409eff"}]
        },
        options:{responsive:true,maintainAspectRatio:false}
    });
}

// 登录
function login() {
    const p = document.getElementById("pwd").value;
    if (p === ADMIN_PWD) {
        document.getElementById("login").style.display = "none";
        document.getElementById("panel").style.display = "block";
        adminList();
    } else {
        alert("密码错误");
    }
}

// 后台列表
async function adminList() {
    await loadData();
    const list = document.getElementById("adminList");
    list.innerHTML = "";
    data.options.forEach((o,i)=>{
        const div = document.createElement("div");
        div.className = "option-item";
        div.innerHTML = `
            <img src="${o.img}">
            <span>${o.name}（${o.count}票）</span>
            <button class="btn btn-danger" onclick="del(${i})">删除</button>
        `;
        list.appendChild(div);
    });
}

// 添加
async function add() {
    const name = document.getElementById("name").value.trim();
    const file = document.getElementById("img").files[0];
    if(!name || !file) return alert("请填写名称并选择图片");

    const reader = new FileReader();
    reader.onload = async e=>{
        await loadData();
        data.options.push({name:name, img:e.target.result, count:0});
        await saveData();
        document.getElementById("name").value = "";
        document.getElementById("img").value = "";
        adminList();
        alert("添加成功！");
    };
    reader.readAsDataURL(file);
}

// 删除
async function del(i) {
    await loadData();
    data.options.splice(i,1);
    await saveData();
    adminList();
}

// 重置票数
async function reset() {
    if(!confirm("确定清空所有票数？")) return;
    await loadData();
    data.options.forEach(o=>o.count=0);
    await saveData();
    adminList();
}

show("vote");
</script>
</body>
</html>
