<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电子投票系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }
        body { background: #f5f7fa; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .title { text-align: center; font-size: 28px; font-weight: bold; color: #2c3e50; margin: 20px 0; }
        .tab-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .tab { padding: 8px 20px; background: #fff; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .tab.active { background: #409eff; color: #fff; border-color: #409eff; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h3 { color: #333; margin-bottom: 15px; font-size: 18px; }
        .vote-item { display: flex; align-items: center; padding: 10px; border: 1px solid #eee; border-radius: 6px; margin-bottom: 8px; gap: 10px; }
        .vote-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; border: 1px solid #eee; }
        .vote-item label { flex: 1; font-size: 14px; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; color: #fff; cursor: pointer; font-size: 14px; }
        .btn-primary { background: #409eff; }
        .btn-success { background: #67c23a; }
        .btn-danger { background: #f56c6c; }
        .chart-box { height: 350px; margin-top: 15px; }
        .login-box { max-width: 350px; margin: 0 auto; }
        .login-box input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 10px; font-size: 14px; }
        .add-form { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .add-form input { flex: 1; min-width: 180px; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .option-item { display: flex; align-items: center; gap: 8px; padding: 8px; border: 1px solid #eee; border-radius: 6px; margin-bottom: 6px; }
        .option-item img { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; }
        .option-item span { flex: 1; font-size: 13px; }
        .tip { font-size: 12px; color: #999; margin-top: 8px; }
        .storage-tip { color: #e6a23c; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
<div class="container">
    <div class="title">电子投票系统</div>

    <div class="tab-bar">
        <div class="tab active" onclick="switchPage('vote')">我要投票</div>
        <div class="tab" onclick="switchPage('result')">投票结果</div>
        <div class="tab" onclick="switchPage('admin')">管理员后台</div>
    </div>

    <div id="vote" class="page active">
        <div class="card">
            <h3>投票选项（仅投1票）</h3>
            <div id="voteContainer"></div>
            <button class="btn btn-primary" onclick="submitVote()" style="margin-top: 15px;">提交投票</button>
            <div class="tip" id="voteTip"></div>
        </div>
    </div>

    <div id="result" class="page">
        <div class="card">
            <h3>投票结果统计</h3>
            <div class="chart-box">
                <canvas id="resultChart"></canvas>
            </div>
        </div>
    </div>

    <div id="admin" class="page">
        <div class="card login-box" id="loginCard">
            <h3>管理员登录</h3>
            <input type="password" id="adminPwd" placeholder="管理员密码：123456">
            <button class="btn btn-primary" onclick="adminLogin()">登录</button>
        </div>

        <div class="card" id="adminPanel" style="display: none;">
            <h3>投票选项管理</h3>
            <div class="add-form">
                <input type="text" id="optName" placeholder="请输入选项名称">
                <input type="file" id="optImg" accept="image/png,image/jpg,image/jpeg">
                <button class="btn btn-success" onclick="addOption()">添加选项</button>
            </div>
            <div class="storage-tip">提示：图片自动压缩，最多10个选项</div>
            <div id="optContainer"></div>
            <button class="btn btn-danger" onclick="resetSystem()" style="margin-top: 15px;">清空系统（重置所有）</button>
        </div>
    </div>
</div>

<script>
// ===================== 本地永久存储（无云端、永不同步失败） =====================
let voteData = JSON.parse(localStorage.getItem("VOTE_SYSTEM_FINAL")) || {
    options: [],
    votedUsers: []
};

const CONFIG = {
    PASSWORD: "123456",
    MAX_OPTIONS: 10,
    IMG_WIDTH: 100,
    IMG_HEIGHT: 100
};

// 保存到本地
function save() {
    localStorage.setItem("VOTE_SYSTEM_FINAL", JSON.stringify(voteData));
}

// 页面切换
function switchPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    event.target.classList.add('active');

    if (pageId === 'vote') renderVote();
    if (pageId === 'result') renderChart();
    if (pageId === 'admin') renderAdmin();
}

// 渲染投票
function renderVote() {
    let c = document.getElementById("voteContainer");
    c.innerHTML = "";

    if (voteData.options.length === 0) {
        c.innerHTML = `<div style="padding:15px;color:#999">暂无投票选项</div>`;
        return;
    }

    voteData.options.forEach((o, i) => {
        let div = document.createElement("div");
        div.className = "vote-item";
        div.innerHTML = `
            <input type="radio" name="opt" value="${i}">
            <img src="${o.img}">
            <label>${o.name}</label>
        `;
        c.appendChild(div);
    });
}

// 渲染管理员
function renderAdmin() {
    let c = document.getElementById("optContainer");
    c.innerHTML = "";
    voteData.options.forEach((o, i) => {
        let div = document.createElement("div");
        div.className = "option-item";
        div.innerHTML = `
            <img src="${o.img}">
            <span>${o.name} (${o.count || 0}票)</span>
            <button class="btn btn-danger" onclick="delOpt(${i})">删除</button>
        `;
        c.appendChild(div);
    });
}

// 图表
function renderChart() {
    let ctx = document.getElementById("resultChart").getContext("2d");
    if (window.chart) window.chart.destroy();
    window.chart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: voteData.options.map(o => o.name),
            datasets: [{
                label: "票数",
                data: voteData.options.map(o => o.count || 0),
                backgroundColor: "#409eff"
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { y: { beginAtZero: true } }
        }
    });
}

// 提交投票
function submitVote() {
    let sel = document.querySelector('input[name="opt"]:checked');
    if (!sel) return alert("请选择一个选项");

    let uid = "u_" + navigator.userAgent + screen.width;
    if (voteData.votedUsers.includes(uid)) return alert("你已投过票");

    voteData.options[sel.value].count = (voteData.options[sel.value].count || 0) + 1;
    voteData.votedUsers.push(uid);
    save();
    alert("投票成功");
    renderVote();
}

// 图片压缩
function compress(file) {
    return new Promise(resolve => {
        let img = new Image();
        let reader = new FileReader();
        reader.onload = e => {
            img.src = e.target.result;
            img.onload = () => {
                let canvas = document.createElement("canvas");
                canvas.width = CONFIG.IMG_WIDTH;
                canvas.height = CONFIG.IMG_HEIGHT;
                let ctx = canvas.getContext("2d");
                ctx.drawImage(img, 0, 0, CONFIG.IMG_WIDTH, CONFIG.IMG_HEIGHT);
                resolve(canvas.toDataURL("image/jpeg", 0.7));
            };
        };
        reader.readAsDataURL(file);
    });
}

// 登录
function adminLogin() {
    let p = document.getElementById("adminPwd").value;
    if (p === CONFIG.PASSWORD) {
        document.getElementById("loginCard").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
        renderAdmin();
    } else {
        alert("密码错误");
    }
}

// 添加选项
async function addOption() {
    let name = document.getElementById("optName").value.trim();
    let file = document.getElementById("optImg").files[0];

    if (!name || !file) return alert("请输入名称并选择图片");
    if (voteData.options.length >= CONFIG.MAX_OPTIONS) return alert("最多10个选项");

    let img = await compress(file);
    voteData.options.push({ name, img, count: 0 });
    save();
    document.getElementById("optName").value = "";
    document.getElementById("optImg").value = "";
    renderAdmin();
    alert("添加成功！");
}

// 删除选项
function delOpt(index) {
    if (!confirm("确定删除？")) return;
    voteData.options.splice(index, 1);
    save();
    renderAdmin();
}

// 重置
function resetSystem() {
    if (!confirm("确定清空所有数据？不可恢复！")) return;
    voteData = { options: [], votedUsers: [] };
    save();
    renderAdmin();
    alert("已重置");
}

// 初始化
switchPage('vote');
</script>
</body>
</html>
